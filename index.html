<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>loxy | Games</title>
    <link rel="icon" type="image/png" href="./images/miku_logo.png">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="top-nav">
        <div class="nav-container">
            <div class="nav-left">
                <img src="./images/miku_logo.png" class="nav-avatar" alt="logo">
                <span class="brand-name">loxy's Games</span>
            </div>
            <div class="nav-capsule">
                <div class="nav-link active" onclick="showSection('dashboard', this)"><i data-lucide="home"></i> Home</div>
                <div class="nav-link" onclick="showSection('communities', this)"><i data-lucide="users"></i> Community</div>
                <div class="nav-link" onclick="showSection('socials-page', this)"><i data-lucide="share-2"></i> Socials</div>
            </div>
            <button class="refresh-pill" onclick="location.reload()"><i data-lucide="refresh-cw"></i> Refresh</button>
        </div>
    </nav>

    <div class="main-wrapper">
        <main id="dashboard" class="page-section">
            <header class="hero-section">
                <h1 class="hero-title">loxy's Games</h1>
                <p class="hero-subtitle">Track analytics and performance across all my Roblox creations.</p>
            </header>

            <div class="premium-stats-grid">
                <div class="stat-card">
                    <div class="stat-header"><span class="stat-label">Total Games</span><i data-lucide="gamepad-2" class="icon-red"></i></div>
                    <div class="stat-number">13</div>
                </div>
                <div class="stat-card">
                    <div class="stat-header"><span class="stat-label">Combined Visits</span><i data-lucide="eye" class="icon-red"></i></div>
                    <div class="stat-number" id="total-visits">0M</div>
                    <div class="stat-trend trend-up"><i data-lucide="trending-up"></i> +0.7% <span class="trend-sub">vs last week</span></div>
                </div>
                <div class="stat-card" id="playing-card">
                    <div class="stat-header"><span class="stat-label">Total Playing</span><i data-lucide="users" class="icon-red"></i></div>
                    <div class="stat-number" id="total-playing">0</div>
                    <div class="stat-trend trend-down"><i data-lucide="trending-down"></i> -31.9% <span class="trend-sub">vs last week</span></div>
                </div>
            </div>

            <div class="section-divider">
                <h2 class="section-title">All Games</h2>
            </div>
            <div id="game-container" class="luca-grid"></div>
        </main>

        <main id="communities" class="page-section" style="display:none;">
            <h1 class="hero-title">Community</h1>
            <div id="group-container" class="premium-stats-grid"></div>
        </main>

        <main id="socials-page" class="page-section" style="display:none;">
            <h1 class="hero-title">Socials</h1>
            <div class="premium-stats-grid">
                <a href="#" class="stat-card" style="text-decoration:none; color:white;"><h3>Discord</h3></a>
                <a href="#" class="stat-card" style="text-decoration:none; color:white;"><h3>YouTube</h3></a>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
