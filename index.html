<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>loxy | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --card: #0d0d0f;
            --border: #1c1c21;
            --red: #ff4747;
            --green: #00e676;
            --text: #ffffff;
            --dim: #71717a;
            --radius: 28px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            padding-top: 100px;
            min-height: 100vh;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }

        /* Navbar */
        .navbar {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: rgba(5,5,5,0.85); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }
        .nav-content {
            max-width: 1100px; margin: 0 auto; display: flex;
            justify-content: space-between; align-items: center; padding: 18px 24px;
        }
        .nav-pill {
            background: #111; border: 1px solid var(--border);
            padding: 5px; border-radius: 100px; display: flex; gap: 5px;
        }
        .nav-btn {
            background: transparent; border: none; color: var(--dim);
            padding: 8px 22px; border-radius: 100px; cursor: pointer;
            font-weight: 700; font-size: 14px; transition: 0.2s;
        }
        .nav-btn.active { background: #1c1c21; color: #fff; }

        /* Content Sections */
        .hero { margin-bottom: 40px; }
        .hero h1 { font-size: 52px; font-weight: 800; letter-spacing: -3px; color: var(--red); line-height: 1; }
        .hero p { color: var(--dim); margin-top: 10px; font-size: 16px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        
        .card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 24px; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none; color: inherit; display: block; position: relative;
        }
        .card:hover { border-color: #444; transform: translateY(-6px); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }

        .thumb-box {
            width: 100%; height: 180px; border-radius: 20px;
            background: #121214; margin-bottom: 20px; overflow: hidden;
            border: 1px solid var(--border); position: relative;
        }
        .thumb-box img { width: 100%; height: 100%; object-fit: cover; }

        .label { font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--dim); letter-spacing: 1.5px; display: block; }
        .title { font-size: 24px; font-weight: 800; margin: 6px 0 15px; letter-spacing: -0.5px; }

        .status { display: flex; align-items: center; gap: 8px; color: var(--green); font-size: 13px; font-weight: 700; }
        .dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; box-shadow: 0 0 12px var(--green); }

        .group-icon { width: 64px; height: 64px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 15px; background: #111; }

        .page { display: none; }
        .page.active { display: block; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <div style="font-weight:800; font-size:22px;">loxy<span style="color:var(--red);">.dev</span></div>
            <div class="nav-pill">
                <button class="nav-btn active" onclick="tab('dash', this)">Home</button>
                <button class="nav-btn" onclick="tab('comm', this)">Community</button>
                <button class="nav-btn" onclick="tab('socs', this)">Socials</button>
            </div>
            <button class="nav-btn" onclick="location.reload()" style="border:1px solid var(--border)">Refresh</button>
        </div>
    </nav>

    <div class="container">
        <section id="dash" class="page active">
            <div class="hero"><h1>Experiences</h1><p>Live tracking for your Roblox games.</p></div>
            <div id="game-grid" class="grid"></div>
        </section>

        <section id="comm" class="page">
            <div class="hero"><h1>Communities</h1><p>Member counts for your three groups.</p></div>
            <div id="group-grid" class="grid"></div>
        </section>

        <section id="socs" class="page">
            <div class="hero"><h1>Socials</h1><p>Connect elsewhere.</p></div>
            <div class="grid">
                <a href="#" class="card"><h3 class="title">Discord</h3><p style="color:var(--dim)">Join the community server.</p></a>
                <a href="#" class="card"><h3 class="title">YouTube</h3><p style="color:var(--dim)">Watch the latest devlogs.</p></a>
            </div>
        </section>
    </div>

    <script>
        // YOUR DATA
        const UNIVERSE_IDS = [9753920000, 9863921361, 9561068069];
        const GROUP_IDS = [623751942, 524021069, 917252309];

        function tab(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        async function init() {
            try {
                // FETCH GAMES
                const gRes = await fetch(`https://games.roproxy.com/v1/games?universeIds=${UNIVERSE_IDS.join(",")}`);
                const { data: games } = await gRes.json();
                
                if(games) {
                    document.getElementById('game-grid').innerHTML = games.map(g => `
                        <a href="https://roblox.com/games/${g.rootPlaceId}" target="_blank" class="card">
                            <div class="thumb-box">
                                <img src="https://thumbnails.roproxy.com/v1/games/icons?universeIds=${g.id}&size=512x512&format=Png&isCircular=false" onerror="this.src='./images/miku_logo.png'">
                            </div>
                            <span class="label">Experience</span>
                            <h3 class="title">${g.name}</h3>
                            <div class="status"><div class="dot"></div>${g.playing} Playing</div>
                        </a>
                    `).join('');
                }

                // FETCH GROUPS
                const groupPromises = GROUP_IDS.map(id => fetch(`https://groups.roproxy.com/v1/groups/${id}`).then(r => r.json()));
                const groups = await Promise.all(groupPromises);
                
                document.getElementById('group-grid').innerHTML = groups.map(group => `
                    <div class="card">
                        <img src="https://thumbnails.roproxy.com/v1/groups/icons?groupIds=${group.id}&size=150x150&format=Png" class="group-icon" onerror="this.src='./images/miku_logo.png'">
                        <span class="label">Community</span>
                        <h3 class="title">${group.name}</h3>
                        <p style="font-size:36px; font-weight:800;">${group.memberCount.toLocaleString()}</p>
                        <span class="label">Members</span>
                    </div>
                `).join('');

            } catch(e) { console.error("Data error:", e); }
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
