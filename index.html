<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>loxy | Dashboard</title>
    <link rel="icon" type="image/png" href="./images/miku_logo.png">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="top-nav">
        <div class="nav-container">
            <div class="nav-left">
                <div class="miku-container">
                    <img src="./images/miku_logo.png" alt="loxy">
                </div>
                <span class="brand-name">loxy.dev</span>
            </div>
            
            <div class="nav-capsule">
                <button class="nav-btn active" onclick="showSection('dashboard', this)">Home</button>
                <button class="nav-btn" onclick="showSection('communities', this)">Community</button>
                <button class="nav-btn" onclick="showSection('socials', this)">Socials</button>
            </div>

            <button class="refresh-pill" onclick="location.reload()"><i data-lucide="refresh-cw"></i></button>
        </div>
    </nav>

    <div class="main-wrapper">
        <main id="dashboard" class="page-section">
            <header class="hero">
                <h1 class="hero-red">loxy's Games</h1>
                <p class="hero-sub">Track analytics and performance across all my Roblox experiences. View real-time player counts, visit statistics, and community growth.</p>
            </header>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-inner">
                        <div>
                            <span class="label">Total Games</span>
                            <div class="number">13</div>
                        </div>
                        <i data-lucide="gamepad-2" class="icon-red"></i>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-inner">
                        <div>
                            <span class="label">Combined Visits</span>
                            <div class="number" id="v-total">0.0M</div>
                            <span class="trend trend-up"><i data-lucide="trending-up"></i> +0.7% <span class="dim">vs last week</span></span>
                        </div>
                        <i data-lucide="eye" class="icon-red"></i>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-inner">
                        <div>
                            <span class="label">Total Playing</span>
                            <div class="number" id="p-total">0</div>
                            <span class="trend trend-down"><i data-lucide="trending-down"></i> -31.9% <span class="dim">vs last week</span></span>
                        </div>
                        <i data-lucide="users" class="icon-red"></i>
                    </div>
                </div>
            </div>

            <div class="divider">
                <h2>All Experiences</h2>
            </div>

            <div id="game-grid" class="game-grid">
                </div>
        </main>

        <main id="communities" class="page-section" style="display:none;"><h1 class="hero-red">Community</h1></main>
        <main id="socials" class="page-section" style="display:none;"><h1 class="hero-red">Social Links</h1></main>
    </div>

    <script src="script.js"></script>
</body>
</html>
