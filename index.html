<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>loxyblox | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --card: #0d0d0f; --border: #1c1c21; --red: #ff4747; --green: #00e676; --text: #ffffff; --dim: #71717a; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; padding-top: 100px; }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
        .navbar { position: fixed; top: 0; width: 100%; z-index: 1000; background: rgba(5,5,5,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
        .nav-content { max-width: 1100px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 18px 24px; }
        .nav-pill { background: #111; border: 1px solid var(--border); padding: 5px; border-radius: 100px; display: flex; gap: 5px; }
        .nav-btn { background: transparent; border: none; color: var(--dim); padding: 8px 22px; border-radius: 100px; cursor: pointer; font-weight: 700; transition: 0.2s; }
        .nav-btn.active { background: #1c1c21; color: #fff; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 28px; padding: 24px; text-decoration: none; color: inherit; transition: 0.3s; }
        .card:hover { border-color: #444; transform: translateY(-5px); }
        .thumb-box { width: 100%; height: 180px; border-radius: 20px; background: #121214; margin-bottom: 20px; overflow: hidden; border: 1px solid var(--border); }
        .thumb-box img { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.5s; }
        .title { font-size: 24px; font-weight: 800; margin-bottom: 10px; }
        .status { color: var(--green); font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; box-shadow: 0 0 10px var(--green); }
        .page { display: none; } .page.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <div style="font-weight:800; font-size:22px;">loxy<span style="color:var(--red);">blox</span></div>
            <div class="nav-pill">
                <button class="nav-btn active" onclick="tab('home', this)">Games</button>
                <button class="nav-btn" onclick="tab('comm', this)">Groups</button>
            </div>
            <button class="nav-btn" onclick="location.reload()" style="border:1px solid var(--border)">Refresh</button>
        </div>
    </nav>

    <div class="container">
        <section id="home" class="page active">
            <h1 style="font-size:48px; letter-spacing:-2px;">Experiences</h1>
            <div id="game-grid" class="grid"></div>
        </section>
        <section id="comm" class="page">
            <h1 style="font-size:48px; letter-spacing:-2px;">Community</h1>
            <div id="group-grid" class="grid"></div>
        </section>
    </div>

    <script>
        const UNIVERSE_IDS = [9753920000, 9863921361, 9561068069];
        const GROUP_IDS = [623751942, 524021069, 917252309];

        function tab(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        async function init() {
            try {
                // GAMES
                const gRes = await fetch(`https://games.roproxy.com/v1/games?universeIds=${UNIVERSE_IDS.join(",")}`);
                const { data: games } = await gRes.json();
                
                if(games) {
                    document.getElementById('game-grid').innerHTML = games.map(g => {
                        const thumb = `https://thumbnails.roproxy.com/v1/games/icons?universeIds=${g.id}&size=512x512&format=Png&isCircular=false`;
                        return `
                        <a href="https://roblox.com/games/${g.rootPlaceId}" target="_blank" class="card">
                            <div class="thumb-box">
                                <img src="${thumb}" referrerpolicy="no-referrer" onload="this.style.opacity=1" onerror="this.src='./images/miku_logo.png'; this.style.opacity=1;">
                            </div>
                            <h3 class="title">${g.name}</h3>
                            <div class="status"><div class="dot"></div>${g.playing} Online</div>
                        </a>`;
                    }).join('');
                }

                // GROUPS
                const groupData = await Promise.all(GROUP_IDS.map(id => fetch(`https://groups.roproxy.com/v1/groups/${id}`).then(r => r.json())));
                document.getElementById('group-grid').innerHTML = groupData.map(group => {
                    const icon = `https://thumbnails.roproxy.com/v1/groups/icons?groupIds=${group.id}&size=150x150&format=Png`;
                    return `
                    <div class="card">
                        <img src="${icon}" referrerpolicy="no-referrer" style="width:64px; border-radius:15px; margin-bottom:15px;" onload="this.style.opacity=1" onerror="this.src='./images/miku_logo.png'; this.style.opacity=1;">
                        <h3 class="title" style="margin-bottom:5px;">${group.name}</h3>
                        <p style="font-size:32px; font-weight:800;">${group.memberCount.toLocaleString()}</p>
                        <span style="color:var(--dim); font-size:11px; font-weight:800; text-transform:uppercase;">Members</span>
                    </div>`;
                }).join('');
            } catch(e) { console.error(e); }
        }
        init();
    </script>
</body>
</html>
