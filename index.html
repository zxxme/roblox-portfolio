<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>loxy's Portfolio</title>
    <link rel="icon" type="image/png" href="./image_256996.png">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="top-nav">
        <div class="nav-container">
            <div class="nav-left">
                <img src="./image_256996.png" class="nav-avatar">
                <span class="brand-name">loxy's Games</span>
            </div>
            
            <div class="nav-capsule">
                <div class="nav-link active" onclick="showSection('dashboard', this)"><i data-lucide="home"></i> Home</div>
                <div class="nav-link" onclick="showSection('dashboard', this)"><i data-lucide="gamepad-2"></i> Games</div>
                <div class="nav-link" onclick="showSection('socials-page', this)"><i data-lucide="share-2"></i> Socials</div>
            </div>

            <button class="refresh-pill" onclick="location.reload()">
                <i data-lucide="refresh-cw"></i> Refresh
            </button>
        </div>
    </nav>

    <main id="dashboard" class="page-section">
        <div class="dashboard-header">
            <h1>loxy's Games</h1>
            <p>Track analytics and performance across all my Roblox creations.</p>
        </div>

        <div class="stats-row">
            <div class="stat-pill"><span class="pill-label">Total Games</span><span class="pill-value">3</span></div>
            <div class="stat-pill"><span class="pill-label">Combined Visits</span><span class="pill-value" id="total-visits">0.0M</span></div>
            <div class="stat-pill"><span class="pill-label">Total Playing</span><span class="pill-value" id="total-playing">0</span></div>
        </div>

        <section id="experiences">
            <h2 class="section-title">All Games</h2>
            <div id="game-container" class="luca-grid"></div>
        </section>

        <section id="communities" style="margin-top: 50px;">
            <h2 class="section-title">Communities</h2>
            <div id="group-container" class="group-row"></div>
        </section>
    </main>

    <main id="socials-page" class="page-section" style="display:none;">
        <div class="dashboard-header">
            <h1>Socials & Contact</h1>
            <div class="social-grid">
                <a href="https://discord.com/users/346046142674501643" target="_blank" class="social-card">
                    <i data-lucide="message-square"></i>
                    <h3>Discord</h3>
                    <p>346046142674501643</p>
                </a>
                <a href="https://www.youtube.com/@zxmeplays" target="_blank" class="social-card">
                    <i data-lucide="youtube"></i>
                    <h3>YouTube</h3>
                    <p>@zxmeplays</p>
                </a>
                <a href="https://www.roblox.com/users/323062316/profile" target="_blank" class="social-card">
                    <i data-lucide="user"></i>
                    <h3>Roblox</h3>
                    <p>@loxy</p>
                </a>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
