<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>loxy | Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <div style="font-weight:800; font-size:20px; color:var(--red);">loxy.dev</div>
            <div class="nav-pill">
                <button class="nav-item active" onclick="showTab('home', this)">Home</button>
                <button class="nav-item" onclick="showTab('community', this)">Community</button>
                <button class="nav-item" onclick="showTab('socials', this)">Socials</button>
            </div>
            <button class="nav-item" onclick="location.reload()">Refresh</button>
        </div>
    </nav>

    <div class="container">
        <section id="home" class="page active">
            <h1 style="font-size:48px; margin-bottom:10px; letter-spacing:-2px;">loxy's Games</h1>
            <p style="color:var(--dim);">Real-time tracking for active experiences.</p>
            <div id="game-grid" class="bento-grid"></div>
        </section>

        <section id="community" class="page">
            <h1 style="font-size:48px; margin-bottom:10px;">Community</h1>
            <div id="group-grid" class="bento-grid"></div>
        </section>

        <section id="socials" class="page">
            <h1 style="font-size:48px; margin-bottom:40px;">Social Links</h1>
            <div class="bento-grid">
                <a href="#" class="bento-card"><h3>Discord</h3></a>
                <a href="#" class="bento-card"><h3>YouTube</h3></a>
            </div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
