<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>loxy | Dashboard</title>
    <link rel="icon" type="image/png" href="./images/miku_logo.png">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <div class="brand">
                <img src="./images/miku_logo.png" class="miku-icon" alt="loxy">
                <span>loxy.dev</span>
            </div>
            <div class="nav-pill">
                <button class="nav-item active" onclick="showSection('dashboard', this)">Home</button>
                <button class="nav-item" onclick="showSection('communities', this)">Community</button>
                <button class="nav-item" onclick="showSection('socials', this)">Socials</button>
            </div>
            <div class="nav-right">
                <button class="icon-btn" onclick="location.reload()"><i data-lucide="refresh-cw"></i></button>
            </div>
        </div>
    </nav>

    <div class="container">
        <main id="dashboard" class="page-section">
            <header class="hero-header">
                <h1 class="accent-text">loxy's Games</h1>
                <p>Track analytics and performance across all my Roblox experiences. View real-time player counts, visit statistics, and community growth.</p>
            </header>

            <div class="stats-row">
                <div class="card stat-card">
                    <div class="card-head"><span>Total Games</span><i data-lucide="gamepad-2" class="red"></i></div>
                    <div class="card-body">13</div>
                </div>
                <div class="card stat-card">
                    <div class="card-head"><span>Combined Visits</span><i data-lucide="eye" class="red"></i></div>
                    <div class="card-body" id="v-total">0.0M</div>
                    <div class="card-foot"><span class="trend up"><i data-lucide="trending-up"></i> +0.7%</span> <span class="dim">vs last week</span></div>
                </div>
                <div class="card stat-card">
                    <div class="card-head"><span>Total Playing</span><i data-lucide="users" class="red"></i></div>
                    <div class="card-body" id="p-total">0</div>
                    <div class="card-foot"><span class="trend down"><i data-lucide="trending-down"></i> -31.9%</span> <span class="dim">vs last week</span></div>
                </div>
            </div>

            <div class="section-title">
                <h2>All Experiences</h2>
            </div>
            <div id="game-grid" class="game-grid"></div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
