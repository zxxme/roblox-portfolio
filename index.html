<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>loxy | Dashboard</title>
    <link rel="icon" type="image/png" href="./images/miku_logo.png">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="mouse-glow" id="mouse-glow"></div>

    <nav class="navbar">
        <div class="nav-content">
            <div class="brand">
                <div class="logo-circle"><img src="./images/miku_logo.png" alt="loxy"></div>
                <span>loxy.dev</span>
            </div>
            
            <div class="nav-pill">
                <button class="nav-item active" onclick="showSection('dashboard', this)">Home</button>
                <button class="nav-item" onclick="showSection('communities', this)">Community</button>
                <button class="nav-item" onclick="showSection('socials', this)">Socials</button>
            </div>

            <button class="refresh-btn" onclick="location.reload()"><i data-lucide="refresh-cw"></i></button>
        </div>
    </nav>

    <div class="container">
        <section id="dashboard" class="page-section active">
            <header class="hero">
                <h1>loxy's Games</h1>
                <p>Live performance tracking and analytics for all Roblox experiences.</p>
            </header>

            <div class="stats-grid">
                <div class="stat-card main-stat">
                    <div class="card-top"><span>Total Games</span><i data-lucide="gamepad-2"></i></div>
                    <div class="card-val">13</div>
                </div>
                <div class="stat-card main-stat">
                    <div class="card-top"><span>Combined Visits</span><i data-lucide="eye"></i></div>
                    <div class="card-val" id="v-count">...</div>
                </div>
                <div class="stat-card main-stat">
                    <div class="card-top"><span>Active Now</span><i data-lucide="users"></i></div>
                    <div class="card-val" id="p-count">...</div>
                </div>
            </div>

            <h2 class="sub-label">All Experiences</h2>
            <div id="game-grid" class="bento-grid">
                </div>
        </section>

        <section id="communities" class="page-section">
            <header class="hero"><h1>Community</h1><p>Monitoring growth and engagement.</p></header>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="card-top"><span>Group Members</span><i data-lucide="users"></i></div>
                    <div class="card-val">0</div>
                </div>
            </div>
        </section>

        <section id="socials" class="page-section">
            <header class="hero"><h1>Social Links</h1><p>Connect with me elsewhere.</p></header>
            <div class="bento-grid">
                <a href="YOUR_LINK" class="stat-card social-link"><i data-lucide="message-circle"></i> Discord</a>
                <a href="YOUR_LINK" class="stat-card social-link"><i data-lucide="youtube"></i> YouTube</a>
                <a href="YOUR_LINK" class="stat-card social-link"><i data-lucide="twitter"></i> Twitter / X</a>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
