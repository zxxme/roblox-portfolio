<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>loxy | Dashboard</title>
    <link rel="icon" type="image/png" href="./images/miku_logo.png">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="mouse-glow" id="mouse-glow"></div>
    <nav class="navbar">
        <div class="nav-content">
            <div class="logo-wrapper"><img src="./images/miku_logo.png"></div>
            <div class="nav-pill">
                <button class="nav-item active" onclick="showTab('dash', this)">Home</button>
                <button class="nav-item" onclick="showTab('comm', this)">Community</button>
                <button class="nav-item" onclick="showTab('socs', this)">Socials</button>
            </div>
            <button class="nav-item" style="border:1px solid #181818" onclick="location.reload()">Refresh</button>
        </div>
    </nav>

    <div class="container">
        <section id="dash" class="tab-content active">
            <div class="hero-section"><h1>loxy's Games</h1><p>Real-time analytics across all studio experiences.</p></div>
            <div class="bento-grid">
                <div class="bento-card">
                    <span class="label">Combined Visits</span>
                    <div class="value" id="v-total">...</div>
                </div>
                <div class="bento-card">
                    <span class="label">Total Playing</span>
                    <div class="value" id="p-total">...</div>
                </div>
            </div>
            <h2 class="label">Live Experiences</h2>
            <div id="game-grid" class="bento-grid"></div>
        </section>

        <section id="comm" class="tab-content">
            <div class="hero-section"><h1>Community</h1><p>Monitoring growth across our groups.</p></div>
            <div id="group-grid" class="bento-grid"></div>
        </section>

        <section id="socs" class="tab-content">
            <div class="hero-section"><h1>Socials</h1><p>Join our external communities.</p></div>
            <div class="bento-grid">
                <a href="#" class="bento-card social-card"><i data-lucide="message-square" style="color:#5865F2"></i> <span>Discord</span></a>
                <a href="#" class="bento-card social-card"><i data-lucide="youtube" style="color:#FF0000"></i> <span>YouTube</span></a>
                <a href="#" class="bento-card social-card"><i data-lucide="twitter" style="color:#1DA1F2"></i> <span>Twitter</span></a>
            </div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
