<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>loxy | Dashboard</title>
    <link rel="icon" type="image/png" href="./images/miku_logo.png">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="mouse-glow" id="mouse-glow"></div>

    <nav class="navbar">
        <div class="nav-content">
            <div class="brand">
                <div class="logo-wrapper"><img src="./images/miku_logo.png"></div>
                <span>loxy.dev</span>
            </div>
            
            <div class="nav-pill">
                <button class="nav-item active" onclick="showTab('dash', this)">Home</button>
                <button class="nav-item" onclick="showTab('comm', this)">Community</button>
                <button class="nav-item" onclick="showTab('socs', this)">Socials</button>
            </div>

            <button class="refresh-pill" onclick="location.reload()"><i data-lucide="refresh-cw"></i></button>
        </div>
    </nav>

    <div class="main-wrapper">
        <section id="dash" class="tab-content active">
            <header class="hero-section">
                <h1>loxy's Games</h1>
                <p>Tracking live performance and engagement metrics for all experiences.</p>
            </header>

            <div class="bento-row">
                <div class="bento-card stat">
                    <span class="label">Total Games</span>
                    <div class="value">13</div>
                </div>
                <div class="bento-card stat">
                    <span class="label">Combined Visits</span>
                    <div class="value" id="v-total">0.0M</div>
                </div>
                <div class="bento-card stat">
                    <span class="label">Total Playing</span>
                    <div class="value" id="p-total">0</div>
                </div>
            </div>

            <h2 class="sub-label">My Experiences</h2>
            <div id="game-grid" class="game-grid">
                </div>
        </section>

        <section id="comm" class="tab-content">
            <header class="hero-section"><h1>Community</h1><p>Our growth across groups and platforms.</p></header>
            <div class="bento-row">
                <div class="bento-card stat">
                    <span class="label">Group Members</span>
                    <div class="value">0</div>
                </div>
            </div>
        </section>

        <section id="socs" class="tab-content">
            <header class="hero-section"><h1>Socials</h1><p>Connect with the dev team.</p></header>
            <div class="game-grid">
                <a href="#" class="bento-card social"><i data-lucide="message-circle"></i> Discord</a>
                <a href="#" class="bento-card social"><i data-lucide="youtube"></i> YouTube</a>
                <a href="#" class="bento-card social"><i data-lucide="twitter"></i> Twitter</a>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
