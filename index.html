<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTubeZxme | Official Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="wrapper">
        <header>
            <h1 class="logo">YouTube<span class="accent">Zxme</span></h1>
            <div class="stats-bar">
                <div class="stat-item"><span id="total-visits">0</span><p>Total Visits</p></div>
                <div class="stat-item"><span id="total-playing">0</span><p>Playing Now</p></div>
                <div class="stat-item"><span id="total-games">0</span><p>Experiences</p></div>
            </div>
        </header>

        <section>
            <h2 class="section-title">My Experiences</h2>
            <div id="game-container"></div>
        </section>

        <section>
            <h2 class="section-title">My Communities</h2>
            <div id="group-container" class="group-grid"></div>
        </section>

        <footer>
            <div class="social-links">
                <a href="#" class="social-btn yt">YouTube</a>
                <a href="#" class="social-btn tw">Twitter / X</a>
                <a href="#" class="social-btn dc">Discord</a>
            </div>
            <p style="margin-top:20px; color:var(--text-dim); font-size:0.8rem;">© 2026 YouTubeZxme • Built for the Roblox Community</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
