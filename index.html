<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>loxy's Games</title>
    <link rel="icon" type="image/png" href="image_256996.png">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="top-nav">
        <div class="nav-container">
            <div class="nav-left">
                <img src="image_256996.png" class="nav-avatar">
                <span class="brand-name">loxy's Games</span>
            </div>
            
            <div class="nav-capsule">
                <a href="#" class="nav-link active"><i data-lucide="home"></i> Home</a>
                <a href="#experiences" class="nav-link"><i data-lucide="gamepad-2"></i> Games</a>
                <a href="#communities" class="nav-link"><i data-lucide="users"></i> Community</a>
                <a href="https://discord.com/users/346046142674501643" target="_blank" class="nav-link"><i data-lucide="share-2"></i> Socials</a>
            </div>

            <button class="refresh-pill" onclick="location.reload()">
                <i data-lucide="refresh-cw"></i> Refresh
            </button>
        </div>
    </nav>

    <main class="dashboard">
        <div class="dashboard-header">
            <h1>loxy's Games</h1>
            <p>Track analytics and performance across all my Roblox creations.</p>
        </div>

        <div class="stats-row">
            <div class="stat-pill">
                <span class="pill-label">Total Games</span>
                <span class="pill-value">3</span>
            </div>
            <div class="stat-pill">
                <span class="pill-label">Combined Visits</span>
                <span class="pill-value" id="total-visits">0M</span>
            </div>
            <div class="stat-pill">
                <span class="pill-label">Total Playing</span>
                <span class="pill-value" id="total-playing">0</span>
            </div>
        </div>

        <section id="experiences">
            <div class="section-title-row">
                <h2>All Games</h2>
            </div>
            <div id="game-container" class="luca-grid"></div>
        </section>

        <section id="communities">
            <div class="section-title-row">
                <h2>Communities</h2>
            </div>
            <div id="group-container" class="group-row"></div>
        </section>
    </main>

    <script src="script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
