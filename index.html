<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>loxy's Portfolio</title>
    <link rel="icon" type="image/png" href="image_256996.png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="top-nav">
        <div class="nav-container">
            <div class="nav-left">
                <img src="image_256996.png" class="nav-avatar">
                <span class="brand-name">loxy's Games</span>
            </div>
            <div class="nav-links">
                <a href="#" class="active">Home</a>
                <a href="#experiences">Games</a>
                <a href="#communities">Community</a>
                <button class="refresh-btn" onclick="location.reload()">Refresh</button>
            </div>
        </div>
    </nav>

    <main class="dashboard">
        <header class="dashboard-header">
            <h1>loxy's Games</h1>
            <p>Track analytics and performance across all my Roblox creations.</p>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-label">Total Games</span>
                <div class="stat-value">3</div>
            </div>
            <div class="stat-card">
                <span class="stat-label">Combined Visits</span>
                <div class="stat-value" id="total-visits">0M</div>
            </div>
            <div class="stat-card">
                <span class="stat-label">Total Playing</span>
                <div class="stat-value" id="total-playing">0</div>
            </div>
        </div>

        <section id="experiences">
            <div class="section-header">
                <h2>All Games</h2>
            </div>
            <div id="game-container" class="game-grid-luca"></div>
        </section>

        <section id="communities" style="margin-top: 50px;">
            <div class="section-header">
                <h2>Communities</h2>
            </div>
            <div id="group-container" class="group-grid-luca"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
